services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      SECRET_KEY: local-dev-secret-key-please-change-me

  ui:
    build: .
    command: uv run streamlit run ui/dashboard.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_URL: http://api:8000

  worker:
    build: .
    command: uv run python scripts/refresh.py
    depends_on:
      - api
      - redis
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0